<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" font-family="'Georgia', 'Times New Roman', serif">

  <rect width="960" height="600" fill="#FFFFFF"/>
  <line x1="40" y1="20" x2="920" y2="20" stroke="#1a1a1a" stroke-width="0.5"/>

  <text x="480" y="52" text-anchor="middle" fill="#1a1a1a" font-size="13" letter-spacing="6" font-weight="400" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">LEAN DAO FRAMEWORK</text>
  <text x="480" y="76" text-anchor="middle" fill="#1a1a1a" font-size="22" font-weight="400">Elastic Workforce Protocol</text>
  <line x1="380" y1="88" x2="580" y2="88" stroke="#1a1a1a" stroke-width="0.5"/>

  <!-- ═══ FLOW: 5 STEPS ═══ -->
  <!-- Step 1 -->
  <rect x="30" y="115" width="160" height="80" rx="2" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  <text x="110" y="142" text-anchor="middle" fill="#1a1a1a" font-size="11" font-weight="700" font-family="'Helvetica Neue', sans-serif">1. DETECT</text>
  <text x="110" y="160" text-anchor="middle" fill="#888" font-size="9">Market signals scanned</text>
  <text x="110" y="175" text-anchor="middle" fill="#888" font-size="9">24/7 by AI Analysts</text>

  <line x1="190" y1="155" x2="218" y2="155" stroke="#1a1a1a" stroke-width="0.5"/>
  <polygon points="215,151 225,155 215,159" fill="#1a1a1a"/>

  <!-- Step 2 -->
  <rect x="225" y="115" width="160" height="80" rx="2" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  <text x="305" y="142" text-anchor="middle" fill="#1a1a1a" font-size="11" font-weight="700" font-family="'Helvetica Neue', sans-serif">2. FORECAST</text>
  <text x="305" y="160" text-anchor="middle" fill="#888" font-size="9">ML model: 7-day</text>
  <text x="305" y="175" text-anchor="middle" fill="#888" font-size="9">rolling demand prediction</text>

  <line x1="385" y1="155" x2="413" y2="155" stroke="#1a1a1a" stroke-width="0.5"/>
  <polygon points="410,151 420,155 410,159" fill="#1a1a1a"/>

  <!-- Step 3 -->
  <rect x="420" y="115" width="160" height="80" rx="2" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  <text x="500" y="142" text-anchor="middle" fill="#1a1a1a" font-size="11" font-weight="700" font-family="'Helvetica Neue', sans-serif">3. PLAN</text>
  <text x="500" y="160" text-anchor="middle" fill="#888" font-size="9">Current capacity vs.</text>
  <text x="500" y="175" text-anchor="middle" fill="#888" font-size="9">projected need</text>

  <line x1="580" y1="155" x2="608" y2="155" stroke="#1a1a1a" stroke-width="0.5"/>
  <polygon points="605,151 615,155 605,159" fill="#1a1a1a"/>

  <!-- Step 4 -->
  <rect x="615" y="115" width="160" height="80" rx="2" fill="#1a1a1a" stroke="#1a1a1a" stroke-width="1"/>
  <text x="695" y="142" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700" font-family="'Helvetica Neue', sans-serif">4. SCALE</text>
  <text x="695" y="160" text-anchor="middle" fill="#ccc" font-size="9">AI: seconds</text>
  <text x="695" y="175" text-anchor="middle" fill="#ccc" font-size="9">Humanoid: days</text>

  <line x1="775" y1="155" x2="803" y2="155" stroke="#1a1a1a" stroke-width="0.5"/>
  <polygon points="800,151 810,155 800,159" fill="#1a1a1a"/>

  <!-- Step 5 -->
  <rect x="810" y="115" width="120" height="80" rx="2" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  <text x="870" y="142" text-anchor="middle" fill="#1a1a1a" font-size="11" font-weight="700" font-family="'Helvetica Neue', sans-serif">5. SETTLE</text>
  <text x="870" y="160" text-anchor="middle" fill="#888" font-size="9">On-chain cost</text>
  <text x="870" y="175" text-anchor="middle" fill="#888" font-size="9">reconciliation</text>

  <!-- Feedback loop -->
  <path d="M 870 195 C 870 215, 870 220, 860 225 L 120 225 C 100 225, 90 220, 90 210 L 90 200" stroke="#ccc" stroke-width="0.5" fill="none" stroke-dasharray="3,2"/>
  <polygon points="86,203 90,193 94,203" fill="#ccc"/>
  <text x="480" y="238" text-anchor="middle" fill="#bbb" font-size="7.5" font-family="'Helvetica Neue', sans-serif" font-style="italic">Reputation scores updated → informs next cycle</text>

  <!-- ═══ SCALE-UP SPEED COMPARISON ═══ -->
  <text x="480" y="280" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="400">Scale-Up Response Time</text>
  <line x1="200" y1="290" x2="760" y2="290" stroke="#eee" stroke-width="0.5"/>

  <!-- Labels column -->
  <text x="140" y="325" text-anchor="end" fill="#1a1a1a" font-size="11" font-family="'Helvetica Neue', sans-serif" font-weight="500">AI Agents</text>
  <text x="140" y="365" text-anchor="end" fill="#1a1a1a" font-size="11" font-family="'Helvetica Neue', sans-serif" font-weight="500">Humanoids</text>
  <text x="140" y="405" text-anchor="end" fill="#1a1a1a" font-size="11" font-family="'Helvetica Neue', sans-serif" font-weight="500">Humans</text>

  <!-- Bars -->
  <rect x="160" y="312" width="680" height="20" rx="1" fill="#1a1a1a"/>
  <text x="510" y="326" text-anchor="middle" fill="#fff" font-size="8" font-family="'Helvetica Neue', sans-serif">0 → 1,000 instances  ·  Pay-per-inference  ·  Zero lead time  ·  ~seconds</text>

  <rect x="160" y="352" width="280" height="20" rx="1" fill="#888"/>
  <text x="300" y="366" text-anchor="middle" fill="#fff" font-size="8" font-family="'Helvetica Neue', sans-serif">Fleet lease expansion  ·  ~days to weeks</text>

  <rect x="160" y="392" width="100" height="20" rx="1" fill="#ccc"/>
  <text x="210" y="406" text-anchor="middle" fill="#fff" font-size="8" font-family="'Helvetica Neue', sans-serif">~weeks–months</text>

  <!-- ═══ SCALE-DOWN COST ═══ -->
  <text x="480" y="450" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="400">Scale-Down Cost</text>
  <line x1="200" y1="460" x2="760" y2="460" stroke="#eee" stroke-width="0.5"/>

  <text x="140" y="488" text-anchor="end" fill="#1a1a1a" font-size="10" font-family="'Helvetica Neue', sans-serif">AI Agents</text>
  <rect x="160" y="477" width="80" height="16" rx="1" fill="#f0f0f0" stroke="#ddd" stroke-width="0.5"/>
  <text x="200" y="489" text-anchor="middle" fill="#333" font-size="8" font-family="'Helvetica Neue', sans-serif">$0 — instant</text>

  <text x="140" y="515" text-anchor="end" fill="#1a1a1a" font-size="10" font-family="'Helvetica Neue', sans-serif">Humanoids</text>
  <rect x="160" y="504" width="250" height="16" rx="1" fill="#f0f0f0" stroke="#ddd" stroke-width="0.5"/>
  <text x="285" y="516" text-anchor="middle" fill="#333" font-size="8" font-family="'Helvetica Neue', sans-serif">Return to pool — lease termination fee only</text>

  <text x="140" y="542" text-anchor="end" fill="#1a1a1a" font-size="10" font-family="'Helvetica Neue', sans-serif">Traditional</text>
  <rect x="160" y="531" width="600" height="16" rx="1" fill="#f5f5f5" stroke="#ddd" stroke-width="0.5"/>
  <text x="460" y="543" text-anchor="middle" fill="#666" font-size="8" font-family="'Helvetica Neue', sans-serif">Severance + legal costs + reputational damage + knowledge loss + morale impact on remaining staff</text>

  <!-- Key insight box -->
  <rect x="100" y="562" width="760" height="24" rx="1" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  <text x="480" y="578" text-anchor="middle" fill="#1a1a1a" font-size="9" font-family="'Helvetica Neue', sans-serif" font-weight="500" letter-spacing="0.5">ELASTIC WORKFORCE = NEAR-ZERO COST OF BEING WRONG  ·  PIVOT FAST  ·  FAIL CHEAP  ·  SCALE WHAT WORKS</text>

  <line x1="40" y1="596" x2="920" y2="596" stroke="#1a1a1a" stroke-width="0.5"/>
</svg>
